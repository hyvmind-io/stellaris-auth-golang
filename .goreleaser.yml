# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: stellaris-auth

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: stellaris-auth
    main: ./cmd/stellaris-auth
    binary: stellaris-auth
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    # Target matrix: macOS arm64, Windows amd64+arm64, Linux amd64+arm64.
    # macOS amd64 is intentionally excluded.
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: default
    # e.g. stellaris-auth-v1.2.3-darwin-arm64.tar.gz / -windows-amd64.zip
    name_template: "{{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # Wrap the binary in a same-named directory inside the archive.
    wrap_in_directory: true
    files:
      - README.md
      - LICENSE

# Per-archive checksum files are generated by scripts/release-build.sh in the
# standard `<hash>  <filename>` layout (so `sha256sum -c` verifies directly).
# GoReleaser's own (split) checksum only emits the bare hash, so it's disabled
# here in favour of the script.
checksum:
  disable: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Publishing the GitHub Release (and its notes, which match CHANGELOG.md) is
# owned by semantic-release (@semantic-release/github); GoReleaser only builds
# and archives. `disable: true` ensures GoReleaser never creates the release
# even if `--skip=publish` is ever dropped from the invocation.
release:
  disable: true
  github:
    owner: hyvmind-io
    name: stellaris-auth
  name_template: "v{{.Version}}"
