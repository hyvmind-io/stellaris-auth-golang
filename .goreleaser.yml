# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: stellaris-auth

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: stellaris-auth
    main: ./cmd/stellaris-auth
    binary: stellaris-auth
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: hyvmind-io
    name: stellaris-auth
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
